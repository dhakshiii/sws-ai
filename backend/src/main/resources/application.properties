spring.application.name=document-dashboard

server.port=${SERVER_PORT:8080}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:100MB}

app.file.upload-dir=${APP_FILE_UPLOAD_DIR:uploads}
app.websocket.allowed-origin=${APP_WEBSOCKET_ALLOWED_ORIGIN:http://localhost:5173}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
